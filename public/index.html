<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>부산 AI·DX 지원사업 문의 포털</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #ffffff;
    --bg-soft: #F8FAFC;
    --primary: #1E40AF;
    --accent: #0EA5E9;
  }
  html, body {
    font-family: 'Pretendard', 'Noto Sans KR', system-ui, -apple-system, sans-serif;
    font-size: 15px;
    background: var(--bg);
    color: #0F172A;
  }
  .card {
    background: #ffffff;
    border: 1px solid #E2E8F0;
    border-radius: 8px;
  }
  .field {
    border: 1px solid #CBD5E1;
    border-radius: 8px;
    padding: 10px 12px;
    width: 100%;
    font-size: 15px;
    background: #ffffff;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .field:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.12);
  }
  .btn-primary {
    background: var(--primary);
    color: #ffffff;
    border-radius: 8px;
    padding: 10px 18px;
    font-weight: 600;
    font-size: 15px;
    transition: background .15s;
  }
  .btn-primary:hover { background: #1D3A9E; }
  .btn-primary:active { background: #17317F; }
  .btn-ghost {
    color: #64748B;
    font-size: 13px;
    padding: 6px 10px;
    border-radius: 8px;
    transition: background .15s, color .15s;
  }
  .btn-ghost:hover { background: #F1F5F9; color: #DC2626; }
  .label {
    font-size: 13.5px;
    font-weight: 600;
    color: #334155;
    margin-bottom: 6px;
    display: block;
  }
  .badge {
    border-radius: 8px;
    padding: 4px 10px;
    font-size: 12.5px;
    font-weight: 600;
    display: inline-block;
    line-height: 1.4;
  }
  /* 카테고리 배지 — 전 카테고리 공통 */
  .badge-cat { background: #DBEAFE; color: #1E40AF; }

  /* 상태 배지 4종 — 채도 강조색 + 어두운 텍스트(#1F2937, WCAG AA 우선) */
  .badge-status-접수      { background: #F59E0B; color: #1F2937; }
  .badge-status-검토중    { background: #3B82F6; color: #1F2937; }
  .badge-status-답변완료  { background: #10B981; color: #1F2937; }
  .badge-status-보류      { background: #94A3B8; color: #1F2937; }

  /* 필터 칩 — 한 줄 가로 스크롤 */
  .chip-row {
    display: flex;
    flex-wrap: nowrap;
    overflow-x: auto;
    gap: 8px;
    padding-bottom: 4px;
    scrollbar-width: thin;
  }
  .chip-row::-webkit-scrollbar { height: 6px; }
  .chip-row::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 3px; }
  .chip {
    flex-shrink: 0;
    white-space: nowrap;
    border: 1px solid #CBD5E1;
    background: #ffffff;
    color: #475569;
    border-radius: 999px;
    padding: 6px 12px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background .12s, color .12s, border-color .12s;
  }
  .chip:hover { background: #F1F5F9; }
  .chip.active {
    background: var(--primary);
    color: #ffffff;
    border-color: var(--primary);
  }
  .filter-label {
    font-size: 12.5px;
    font-weight: 600;
    color: #64748B;
    margin-bottom: 6px;
  }
  /* 에러 박스 — JS 유효성 검사 / AI 초안 실패 메시지 공용 */
  .error-box {
    background: #FEF2F2;
    border: 1px solid #FECACA;
    color: #B91C1C;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13.5px;
    font-weight: 500;
  }

  /* ───── 관리자 모드 토글 (우상단 세그먼트) ───── */
  .mode-toggle {
    display: inline-flex;
    border: 1px solid #CBD5E1;
    border-radius: 8px;
    overflow: hidden;
    background: #ffffff;
  }
  .mode-toggle button {
    padding: 8px 14px;
    font-size: 13.5px;
    font-weight: 600;
    color: #475569;
    background: #ffffff;
    transition: background .12s, color .12s;
  }
  .mode-toggle button + button { border-left: 1px solid #CBD5E1; }
  .mode-toggle button.active { background: var(--primary); color: #ffffff; }

  /* ───── 모드별 가시성 ───── */
  .admin-only { display: none; }
  body[data-mode="admin"] .admin-only { display: block; }

  .answer-block {
    display: none;
    margin-top: 16px;
    border-left: 4px solid var(--accent);
    background: var(--bg-soft);
    border-radius: 8px;
    padding: 16px;
  }
  body[data-mode="user"] li[data-status="답변완료"] .answer-block { display: block; }
  body[data-mode="admin"] li[data-has-answer="1"] .answer-block { display: block; }

  /* ───── 관리자 컨트롤 ───── */
  .status-select { width: auto; padding: 6px 10px; font-size: 14px; }

  /* ✨ AI 답변 초안 버튼 — 보조 청록 강조 */
  .btn-draft-reply {
    background: var(--accent);
    color: #ffffff;
    border-radius: 8px;
    padding: 8px 14px;
    font-weight: 600;
    font-size: 14px;
    transition: background .15s, opacity .15s;
  }
  .btn-draft-reply:hover { background: #0C93D1; }
  .btn-draft-reply:disabled {
    background: #94A3B8;
    color: #ffffff;
    cursor: not-allowed;
    opacity: .85;
  }
</style>
</head>
<body class="min-h-screen" data-mode="user" style="background: var(--bg-soft);">
  <!-- 카드 간격 16px: space-y-4 (= 1rem = 16px) -->
  <div class="max-w-3xl mx-auto px-4 py-10">

    <!-- 헤더 + 모드 토글 -->
    <header class="mb-6 flex items-start justify-between gap-3 flex-wrap">
      <div class="min-w-0">
        <h1 class="text-2xl md:text-3xl font-bold" style="color: var(--primary);">
          부산 AI·DX 지원사업 문의 포털
        </h1>
        <p class="mt-2 text-slate-600">
          지역기업·시민 누구나 부산정보산업진흥원의 지원사업에 문의할 수 있는 창구입니다.
        </p>
      </div>
      <div id="mode-toggle" class="mode-toggle shrink-0" role="tablist" aria-label="모드 전환">
        <button type="button" data-mode-target="user" class="active">👤 사용자</button>
        <button type="button" data-mode-target="admin">🔧 관리자</button>
      </div>
    </header>

    <!-- 문의 작성 폼 카드 -->
    <section class="card p-5 md:p-6 mb-4">
      <h2 class="text-lg font-bold mb-4">문의 작성</h2>
      <form id="inquiry-form" class="space-y-4" novalidate>
        <div>
          <label class="label" for="category">카테고리</label>
          <select id="category" class="field">
            <option value="">카테고리를 선택해주세요</option>
            <option value="AI·DX 솔루션">AI·DX 솔루션</option>
            <option value="데이터·클라우드 바우처">데이터·클라우드 바우처</option>
            <option value="교육·인재양성">교육·인재양성</option>
            <option value="스타트업 입주·창업">스타트업 입주·창업</option>
            <option value="게임·콘텐츠">게임·콘텐츠</option>
            <option value="해외진출">해외진출</option>
            <option value="기타">기타</option>
          </select>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="label" for="title">제목</label>
            <input id="title" type="text" class="field" placeholder="문의 제목을 입력해주세요" />
          </div>
          <div>
            <label class="label" for="name">이름</label>
            <input id="name" type="text" class="field" placeholder="이름" />
          </div>
        </div>

        <div>
          <label class="label" for="content">내용</label>
          <textarea id="content" class="field" rows="4" placeholder="문의하실 내용을 자세히 적어주세요"></textarea>
        </div>

        <div id="form-error" class="error-box hidden" role="alert"></div>

        <div class="flex justify-end">
          <button type="submit" class="btn-primary">등록하기</button>
        </div>
      </form>
    </section>

    <!-- 필터 칩 -->
    <section class="card p-4 md:p-5 mb-4">
      <div class="mb-3">
        <div class="filter-label">카테고리</div>
        <div id="filter-category" class="chip-row" role="tablist" aria-label="카테고리 필터"></div>
      </div>
      <div>
        <div class="filter-label">상태</div>
        <div id="filter-status" class="chip-row" role="tablist" aria-label="상태 필터"></div>
      </div>
    </section>

    <!-- 문의 목록 -->
    <section>
      <div class="flex items-baseline justify-between mb-3">
        <h2 class="text-lg font-bold">문의 목록</h2>
        <span id="count" class="text-sm text-slate-500"></span>
      </div>
      <ul id="inquiry-list" class="space-y-4"></ul>
    </section>

    <footer class="mt-10 text-center text-xs text-slate-400">
      © 부산정보산업진흥원 (BIPA) · 교육용 시드 페이지
    </footer>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
